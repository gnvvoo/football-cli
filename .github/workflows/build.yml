# .github/workflows/build.yml

name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.0.0, v1.2.3 같은 태그 push 시 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Go 설치
      - name: Go 설치
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. 의존성 설치
      - name: 의존성 설치
        run: go mod tidy

      # 4. Linux 바이너리 빌드
      - name: Linux 바이너리 빌드
        run: go build -o football-cli .

      # 5. GitHub Releases에 바이너리 업로드
      - name: GitHub Releases 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: football-cli
